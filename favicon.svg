<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Dark background so it shows in browser tabs -->
  <rect width="32" height="32" rx="6" fill="#080d1a"/>
  <!-- Hexagon -->
  <polygon points="16,3 27,9.5 27,22.5 16,29 5,22.5 5,9.5"
           fill="none" stroke="url(#g)" stroke-width="1.8"/>
  <!-- A mark -->
  <polyline points="11,23 16,10 21,23"
            fill="none" stroke="url(#g)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="13" y1="18.5" x2="19" y2="18.5"
        stroke="url(#g)" stroke-width="1.8" stroke-linecap="round"/>
</svg>
